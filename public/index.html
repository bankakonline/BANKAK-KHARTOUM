<style>
:root {
  --primary: #C42020;
  --primary-dark: #A81818;
  --primary-light: #E03030;
  --accent: #F4C842;
  --bg: #F0F2F5;
  --white: #FFFFFF;
  --surface: #FAFAFA;
  --border: #E8E8E8;
  --text-primary: #1A1A2E;
  --text-secondary: #6B7280;
  --text-muted: #9CA3AF;
  --success: #16A34A;
  --error: #DC2626;
  --warning: #D97706;
  --font-ar: 'Cairo', sans-serif;
  --font-en: 'Inter', sans-serif;
  --ease: cubic-bezier(0.4,0,0.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-ar);
  background: var(--bg);
  color: var(--text-primary);
  direction: rtl;
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.screen { display: none; width: 100%; height: 100vh; flex-direction: column; }
.screen.active { display: flex; animation: fadeUp 0.35s var(--ease) both; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.header {
  height: 110px;
  min-height: 110px;
  background: linear-gradient(145deg, #C8403D 0%, var(--primary) 50%, var(--primary-dark) 100%);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(196,32,32,0.4);
}
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 80% 50%, rgba(255,255,255,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.header::after {
  content: '';
  position: absolute;
  bottom: -30px; right: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  pointer-events: none;
}

.header-badge {
  background: linear-gradient(135deg, #F4C842, #E6A820);
  border-radius: 16px;
  width: 82px;
  min-width: 82px;
  height: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 6px;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.3);
  position: relative;
  z-index: 1;
}
